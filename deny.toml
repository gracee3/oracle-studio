[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
	"AGPL-3.0-or-later",
	"AGPL-3.0-only",
  "Apache-2.0",
  "BSD-3-Clause",
  "MIT",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "https://github.com/gracee3/astraeus",
  "https://github.com/gracee3/sibylla",
]
